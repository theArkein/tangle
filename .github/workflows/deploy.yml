name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Worker deps
        run: npm ci

      - name: Type-check Worker
        run: npm run type-check

      - name: Run Worker tests
        run: npm test

      - name: Install Frontend deps
        run: npm ci --prefix frontend

      - name: Type-check Frontend
        run: npm run type-check --prefix frontend

  deploy-worker:
    name: Deploy Worker + Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Worker deps
        run: npm ci

      - name: Install & build Frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Check for migration changes
        id: migration-check
        run: |
          if git diff --name-only HEAD~1 HEAD -- migrations/ | grep -q '\.sql'; then
            echo "pending=true" >> $GITHUB_OUTPUT
          else
            echo "pending=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply D1 migrations
        if: steps.migration-check.outputs.pending == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply tangle-db

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
